<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 Methods of styling</title>
  <link rel="stylesheet" href="methodsOfStyling.css">

  <!-- Internal styling -->
  <style>
    .internal1 {
      background-color: green;
      width: 100px;
      height: 40px;
      color: white;
    }

    .internal2 {
      background-color: yellow;
      width: 100px;
      height: 40px;
    }
  </style>

</head>

<body>
  
  <!-- Inline styling -->
  <button style="background-color: red; width: 100px; height: 40px; color: white;">
    Inline
  </button>

  <!-- Internal styling -->
  <button class="internal1">
    Internal1
  </button>

  <button class="internal2">
    Internal2
  </button>


  <!-- External  -->
  <button class="external1">
    External1
  </button>


  <br>
  
  <!-- Practice -->
  <button class="subscribe">SUBSCRIBE</button>
  <button class="like">Like</button>

</body>
</html>
