<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="text-gray-700 font-[Poppins]">
  
  <section id="display" class="p-5 space-y-3">
    <!-- render students here -->
  </section>

  <script>

    async function getStudents() {

      const response = await fetch(`http://localhost:5000/getStudents`);
      const data = await response.json();

      const students = data.students;
  
      const display = document.getElementById("display");
      students.forEach(student => {
        display.innerHTML += `
          <div class="border border-gray-300 p-4 max-w-sm">
            <h1>${student.name}</h1>
            <p class="text-sm italic text-gray-500">${student.email}</p>
          </div>
        `;
      });

    }

    getStudents();


  </script>

</body>
</html>
