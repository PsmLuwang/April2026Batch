<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get user by ID</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="text-gray-700 font-[Poppins]">
  
  <section class="px-5">
    <form onsubmit="displayUserById(event)" class="mt-5 w-full max-w-md mx-auto space-y-3">
      <div class="flex flex-col gap-2">
        <label for="userId" class="text-sm font-semibold text-gray-500">User ID</label>
        <input 
          id="userId"
          name="userId"
          type="number"
          required
          placeholder="User ID"
          class="border border-gray-300 p-3"
        />
      </div>
  
      <button type="submit" class="bg-blue-400 w-full h-12 text-white">
        Search
      </button>
    </form>
  </section>

  <section id="userDisplay" class="p-5">
    <!-- render user card here -->
  </section>



  <script>

    // main
    async function displayUserById(e) {
      e.preventDefault();

      // get user data from backend
      const response = await getUserById(e.target.userId.value);

      if (response.success) {
        displayUser(response.data);

      } else {
        handleUserNotFoundDisplay(response.message);
      }
      
    }


    // get user data from backend
    async function getUserById(userId) {
      try {
        const response = await fetch(`https://api.freeapi.app/api/v1/public/randomusers/${userId}`);  // params
        const data = await response.json();
        if (!data.success) {
          throw new Error(data.message || "Somthing went wrong!");
        }
      
        return data;
      } catch (error) {
        return {
          success: false,
          message: error.message
        }
      }
    }


    // display user data
    function displayUser(userData) {
      const display = document.getElementById("userDisplay");

      display.innerHTML = `
        <div class="w-full max-w-md mx-auto p-5 border border-gray-300 flex gap-5">

          <div class="space-y-4">
            <img src="${userData.picture.large}" alt="profile">
      
            <div class="-space-y-1">
              <h1 class="text-sm">${userData.name.title} ${userData.name.first} ${userData.name.last}</h1>
              <a href="#" class="text-xs text-gray-500">@${userData.login.username}</a>
            </div>
          </div>

          <div class="space-y-2">
            <p class="text-sm">Registered On: ${new Date(userData.registered.date).toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' })}</p>
            <p class="text-sm">Age: ${userData.dob.age}</p>
            <p class="flex items-start gap-2 text-sm">
              ${
                userData.gender == "male" 
                ? `<i class="fa-solid fa-mars pt-0.5"></i>` 
                : `<i class="fa-solid fa-venus pt-0.5"></i>`
              }
              ${userData.gender[0].toUpperCase() + userData.gender.slice(1)}
            </p>
            <p class="flex items-start gap-2 text-sm">
              <i class="fa-solid fa-envelope pt-0.5"></i>
              ${userData.email}
            </p>
            <p class="flex items-start gap-2 text-sm">
              <i class="fa-solid fa-phone pt-0.5"></i>
              ${userData.phone}
            </p>
            <p class="flex items-start gap-2 text-sm">
              <i class="fa-solid fa-location-dot pt-0.5"></i>
              ${userData.location.city}, ${userData.location.state}, ${userData.location.country}, ${userData.location.postcode}
            </p>
          </div>

        </div>
      `;
    }


    // display error message 
    function handleUserNotFoundDisplay(message) {
      const display = document.getElementById("userDisplay");
      display.innerHTML = `
        <div class="max-w-md mx-auto p-5 border border-gray-300 flex gap-5">
          <h1 class="flex items-center gap-4">
            <div class="bg-red-400 text-white size-8 grid place-items-center">
              <i class="fa-solid fa-exclamation"></i>
            </div>
            ${message}
          </h1>
        </div>
      `;
    }
  </script>
</body>
</html>
