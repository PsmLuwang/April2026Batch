<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="text-gray-700 font-[Poppins]">

  <section class="px-5">
    <form onsubmit="getProductById(event)" class="mt-5 w-full max-w-sm mx-auto space-y-3">
      <div class="flex flex-col gap-2">
        <label for="productId" class="text-sm font-semibold text-gray-500">Product ID</label>
        <input 
          id="productId"
          name="productId"
          type="number"
          required
          placeholder="Product ID"
          class="border border-gray-300 p-3"
        />
      </div>
  
      <button type="submit" class="bg-blue-400 w-full h-12 text-white">
        Search
      </button>
    </form>
  </section>
  
  
  <section id="display" class="p-5 space-y-3">
    <!-- render Products here -->
  </section>


  <section id="recentDisplay" class="p-5 space-y-3">
    <!-- recent Products here -->
  </section>

  <script>
    const recent = []; // recent data

    async function getProductById(e) {
      try {
        e.preventDefault(); // prevent reload
        const response = await fetch(`https://api.freeapi.app/api/v1/public/randomproducts/${e.target.productId.value}`);
        const data = await response.json();
  
        const product = data.data;
    
        // display product 
        const display = document.getElementById("display");
        display.innerHTML = `
          <div class="border border-gray-300 p-4 max-w-sm mx-auto">
            <h1>${product.title}</h1>
            <p class="text-sm font-semibold text-gray-500">₹${product.price}</p>
          </div>
        `;

        // display recent products
        const recentDisplay = document.getElementById("recentDisplay");
        if (!recent.length == 0) {
          recentDisplay.innerHTML = `<h1 class="max-w-sm mx-auto">Recent:</h1>`;
        }
        recent.forEach(product => {
          recentDisplay.innerHTML += `
            <div class="border border-gray-300 p-4 max-w-sm mx-auto">
              <h1>${product.title}</h1>
              <p class="text-sm font-semibold text-gray-500">₹${product.price}</p>
            </div>
          `;
        });
        
        // add current searched product to recent data
        if (recent.length >= 3) {
          recent.pop(); // remove last product if the recent product is more than 3
        }
        recent.unshift(product); // add the current searched product to the top of the recent data 


      } catch (error) {
        console.log(error);
      }
    }


  </script>

</body>
</html>
