<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Books</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body class="text-gray-700 font-[Poppins]">
  
  <section id="booksContainer" class="grid grid-cols-4 max-lg:grid-cols-3 max-md:grid-cols-2 max-sm:grid-cols-1 p-5 gap-3">

  </section>


  <script>
    async function getBooksAndDisplay() {
      try {
        const response = await fetch(`https://api.freeapi.app/api/v1/public/books?page=2&limit=10&inc=kind%2Cid%2Cetag%2CvolumeInfo&query=tech`);
        const data = await response.json();

        const books = data.data.data;
      
        // dom 
        const display = document.getElementById("booksContainer");
        books.forEach(book => {
          display.innerHTML += `
            <div class="border border-gray-300 p-4">
              <img class="mb-4" src="${book.volumeInfo.imageLinks.thumbnail}" alt="" />

              <h1 class="text-sm">${book.volumeInfo.title}</h1>

              <div>
                ${
                  book.volumeInfo.authors.map(author => 
                    `<h1 class="text-gray-800 font-semibold">${author}</h1>`
                  ).join("")
                }
              </div>
            </div>
          `;
        });

      } catch (error) {
        console.log(error);
      }
    }

    getBooksAndDisplay();


  </script>
</body>
</html>
