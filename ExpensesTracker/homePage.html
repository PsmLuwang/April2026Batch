<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expenses Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <style>
    /* Chrome, Safari, Edge, Opera */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    /* Firefox */
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>

</head>
<body>
  <nav class="h-16 mb-5 bg-gray-100 flex justify-between items-center px-5">
    <a href="#" class="text-lg font-semibold">Expenses Tracker</a>

    <div class="flex items-center max-md:gap-2 gap-5 text-[0.9rem]">
      <a href="#" class="max-md:hidden">Page 1</a>
      <a href="#" class="max-md:hidden">Page 2</a>
      <a href="#" class="max-md:hidden">Page 3</a>
      <a href="#" class="max-md:hidden">Page 4</a>
      <a href="#" class="bg-gray-500 h-8 w-8 grid place-content-center rounded-full text-white font-semibold">
        M
      </a>

      <button class="md:hidden cursor-pointer">
        <i class="fa-solid fa-ellipsis-vertical"></i>
      </button>
    </div>
  </nav>
  
  <header>
    <div class="bg-white rounded-lg border border-gray-200 shadow-lg w-280 max-w-[calc(100%-40px)] mx-auto p-5">
      <form class="space-y-3">

        <div class="flex justify-end max-sm:flex-col items-center max-sm:items-end gap-3">
          <select 
            class="bg-gray-200 px-5 min-w-30 h-8 rounded-sm"
            name="catagory" 
            id="catagory"
          >
            <option value="test1">Test1</option>
            <option value="test2">Test2</option>
            <option value="test3">Test3</option>
          </select>


          <div class="flex gap-4 bg-gray-200 h-8 px-5 items-center rounded-sm">
            <div>
              <input type="radio" name="action" id="cr">
              <label for="cr">Credit</label>
            </div>
            <div>
              <input type="radio" name="action" id="dr">
              <label for="dr">Debit</label>
            </div>
          </div>
        </div>

        <div class="flex flex-col">
          <label for="particular" class="text-[0.8rem] text-gray-600 font-semibold">Particular</label>
          <input 
            id="particular"
            name="particular"
            class="border border-gray-300 rounded-sm h-10 px-3"
            placeholder="Particular"
            type="text" 
          />
        </div>

        <div class="flex flex-col">
          <label for="remark" class="text-[0.8rem] text-gray-600 font-semibold">Remark</label>
          <input 
            id="remark"
            name="remark"
            class="border border-gray-300 rounded-sm h-10 px-3"
            placeholder="Remark"
            type="text" 
          />
        </div>

        <div class="flex items-end gap-3">
          <div class="flex flex-col flex-1 min-w-0">
            <label for="amount" class="text-[0.8rem] text-gray-600 font-semibold">Amount</label>
            <input 
              id="amount"
              name="amount"
              class="border border-gray-300 rounded-sm h-10 px-3"
              placeholder="Amount"
              type="number" 
            />
          </div>

          <button 
            type="submit"
            class="bg-gray-600 text-white text-[0.9rem] font-semibold min-w-20 w-20 h-10 rounded-sm cursor-pointer"
          >
            Add
          </button>
        </div>
      </form>
    </div>
  </header>

  <section>
    <div id="transactionContainer" class="w-280 max-w-[calc(100%-40px)] mx-auto py-5 space-y-3">

      <h1 class="text-lg font-semibold text-gray-800">Transactions</h1>

      <!-- Render Transactions here -->

    </div>
  </section>


  <script>
    const transactionContainer = document.getElementById("transactionContainer");
    for (let i = 0; i < 10; i++) {
      transactionContainer.innerHTML += `
        <div class="
          bg-white p-4 rounded-md border border-gray-200 flex gap-3 shadow-md cursor-pointer 
          hover:bg-gray-50/50 hover:shadow-lg hover:translate-x-2 transition-all duration-300
        ">

          <div class="flex gap-3 flex-1 items-center">
            <div class="bg-gray-500 text-white h-10 w-10 rounded-sm grid place-content-center">
              <i class="fa-solid fa-cart-arrow-down"></i>
            </div>
    
            <div class="flex-1">
              <h1 class="text-lg font-semibold text-gray-800">Cashback</h1>
              <p class="text-[0.8rem] text-gray-600">12th Jan 2026 at 11:35am</p>
            </div>
          </div>

          <h1 class="text-lg font-semibold text-green-600">+ ₹249</h1>
        </div>
      `;
    }
  </script>

</body>
</html>
