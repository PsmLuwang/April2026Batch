<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

  <!-- form -->
  <section>
    <form 
      onsubmit="addNewMember(event)"
      class="border border-gray-300 w-md max-w-[calc(100%-40px)] mx-auto p-5 my-5 rounded-lg shadow-md space-y-3" 
    >
      <div class="flex flex-col gap-1">
        <label for="name" class="text-sm font-semibold text-gray-600">Name <span class="text-red-500">*</span></label>
        <input 
          id="name"
          name="name"
          placeholder="Name"
          type="text" 
          required
          class="h-10 border border-gray-300 px-3 rounded-sm "
        />
      </div>

      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-semibold text-gray-600">Email <span class="text-red-500">*</span></label>
        <input 
          id="email"
          name="email"
          placeholder="Email"
          type="email" 
          required
          class="h-10 border border-gray-300 px-3 rounded-sm "
        />
      </div>

      <button 
        type="submit"
        class="bg-blue-400 w-full h-10 rounded-sm cursor-pointer text-white font-semibold text-sm"
      >
        Add new
      </button>
    </form>
  </section>


  <!-- Display here -->
  <section>
    <h1 class="text-center text-xl font-semibold mb-5">Members</h1>

    <div id="container" class="space-y-3">
      <!-- render members here -->
    </div>
  </section>


  <script src="form.js"></script>
</body>
</html>
