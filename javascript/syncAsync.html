<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <h1>Sync function and Async func</h1>

  <script>

    function fun1(res) {
      return new Promise((resolve, reject) => {

        if (res == "resolve") {
          setTimeout(() => {
            console.log("Task 1");
            resolve();
          }, 3000);
        } else if (res = "reject") {
          reject();
        }


      });
    }

    async function fun2() {
      await fun1("resolve"); // 3s

      console.log("Task 2");
      console.log("Task 3");
    }

    fun2();
  </script>
</body>
</html>
