<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-[#f2f4ff]">
  

  <div class="bg-white border-2 border-[#dadcff] rounded-[32px] w-100 mx-auto mt-20 shadow-lg p-2"> 
    <div class="relative bg-[#22252d] rounded-[24px] h-30 grid place-content-center mb-12">
      <h1 class="text-xl bg-gradient-to-r from-[#e9ebff] to-[#afb8fe] inline font-bold bg-clip-text text-transparent">Design + Code</h1>

      <img
        class="h-24 w-24 object-cover rounded-full absolute bottom-0 left-6 translate-y-[50%] border-5 border-white"
        src="https://static.vecteezy.com/system/resources/previews/004/708/626/non_2x/letter-w-logo-design-with-modern-purple-color-isolated-on-dark-background-vector.jpg" 
        alt="Profile Picture"
      />
    </div>

    <div class="px-5 py-2 pb-4 space-y-3">
      <div class="flex justify-between">
        <div class="-space-y-1">
          <h1 class="text-lg font-bold text-gray-700">Kartick Khorwal</h1>
          <a class="text-sm text-gray-500/80 font-semibold" href="#">@kartikk</a>
        </div>
    
        <button class="bg-blue-500 h-8 w-20 rounded-full text-white">Follow</button>
      </div>

      <p class="text-sm text-gray-500/80 font-semibold">
        Building Websites and Webapps with Seamless User Experience Across Devices.
      </p>

      <div class="flex gap-8">
        <h1 class="flex items-center gap-2 text-sm font-semibold text-gray-500/80"><span class="font-bold text-lg text-gray-700">238</span> Following</h1>
        <h1 class="flex items-center gap-2 text-sm font-semibold text-gray-500/80"><span class="font-bold text-lg text-gray-700">84</span> Followers</h1>
      </div>

      <div>
        <a href="#" class="flex gap-1 text-sm text-blue-600 font-semibold items-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-link-icon lucide-link"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> 
          kartikkhorwal.com
        </a>
        
        <a href="#" class="flex gap-1 text-sm text-gray-500/80 font-semibold items-center">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-map-pin-icon lucide-map-pin"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 14.993 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>
          India
        </a>
      </div>
    </div>


  </div>

</body>
</html>
